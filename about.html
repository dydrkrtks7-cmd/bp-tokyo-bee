    <!-- Inline CSS for Brutalist/Neon Theme (Simulated Context) -->
    <style>
        :root {
            --bg-color: #0a0b10; /* Deep Void Black */
            --text-main: #e0e6ed; /* Off-white */
            --accent-red: #ff3d58; /* Neon Red */
            --accent-cyan: #00f2ea; /* Electric Cyan */
            --border-color: #ffffff; /* Pure White Border for Brutalism */
            --font-main: 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Layout Utilities */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Brutalist Components */
        h1, h2, h3 {
            font-family: var(--font-mono);
            text-transform: uppercase;
            margin-top: 0;
            border-bottom: 4px solid var(--border-color);
            padding-bottom: 10px;
            letter-spacing: -1px;
        }

        h2 {
            font-size: 2rem;
            color: var(--accent-cyan);
            margin-top: 30px;
        }

        p {
            margin-bottom: 1.5em;
            font-size: 1.1rem;
            max-width: 70ch; /* Readability optimization */
        }

        .card-brutal {
            border: 2px solid var(--border-color);
            background: #14161c;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 8px 8px 0px rgba(255, 61, 88, 0.2); /* Offset shadow */
            transition: transform 0.2s ease;
        }

        .card-brutal:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px rgba(255, 61, 88, 0.3);
        }

        .highlight-text {
            color: var(--accent-red);
            font-weight: bold;
        }

        /* Navigation (Simulated) */
        nav {
            border-bottom: 4px solid var(--border-color);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1c23;
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            font-family: var(--font-mono);
        }
        
        /* Visual Rhythm Break */
        .break-line {
            height: 8px;
            background: repeating-linear-gradient(90deg, var(--border-color), var(--border-color) 20px, transparent 20px, transparent 40px);
            margin: 30px 0;
        }

        .info-tag {
            display: inline-block;
            background: var(--accent-red);
            color: #fff;
            padding: 5px 10px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            border-radius: 2px; /* Slight radius for contrast */
        }
    </style>
</head>
