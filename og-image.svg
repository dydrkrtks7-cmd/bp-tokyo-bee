<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="173" cy="639" r="34" fill="#1565c0" opacity="0.08"/>
    <circle cx="1277" cy="-28" r="20" fill="#1565c0" opacity="0.10"/>
    <circle cx="186" cy="546" r="26" fill="#1565c0" opacity="0.11"/>
    <circle cx="1149" cy="54" r="85" fill="#1565c0" opacity="0.08"/>
    <circle cx="755" cy="327" r="52" fill="#1565c0" opacity="0.18"/>
    <circle cx="777" cy="250" r="31" fill="#1565c0" opacity="0.08"/>
    <rect x="212" y="-76" width="33" height="78" rx="8" fill="#0d47a1" opacity="0.05" transform="rotate(35, 3, 329)"/>
    <rect x="520" y="573" width="58" height="55" rx="8" fill="#0d47a1" opacity="0.11" transform="rotate(36, 1263, 504)"/>
    <rect x="437" y="152" width="67" height="72" rx="8" fill="#0d47a1" opacity="0.07" transform="rotate(14, 547, -93)"/>
    <rect x="637" y="-7" width="99" height="75" rx="8" fill="#0d47a1" opacity="0.11" transform="rotate(32, 326, 43)"/>
    <rect x="134" y="379" width="27" height="86" rx="8" fill="#0d47a1" opacity="0.12" transform="rotate(26, 621, 516)"/>
    <rect x="-74" y="37" width="73" height="90" rx="8" fill="#0d47a1" opacity="0.08" transform="rotate(27, 548, 142)"/>
    <rect x="1205" y="296" width="60" height="45" rx="8" fill="#0d47a1" opacity="0.10" transform="rotate(5, 393, 106)"/>
    <rect x="170" y="628" width="29" height="47" rx="8" fill="#0d47a1" opacity="0.07" transform="rotate(28, -26, -50)"/>
    <polygon points="158,5 228,145 88,145" fill="#1565c0" opacity="0.10"/>
    <polygon points="654,-67 699,23 609,23" fill="#1565c0" opacity="0.04"/>
    <polygon points="1073,474 1172,672 974,672" fill="#1565c0" opacity="0.12"/>
    <polygon points="134,358 225,540 43,540" fill="#1565c0" opacity="0.05"/>

  <!-- Wave at bottom -->
  <path d="M0,558 C360,594 840,522 1200,558 L1200,630 L0,630Z" fill="#1565c0" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    마곡 가라오케 추천정보
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마곡 — 가라오케
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마곡 마곡 가라오케 추천정보 — 가라오케
  </text>
</svg>